<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Gym Tracker">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap {
      width: 100%; max-width: 360px; padding: 0 24px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .login-icon { font-size: 72px; margin-bottom: 16px; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .login-sub { font-size: 14px; opacity: 0.5; margin-bottom: 32px; text-align: center; }
    .login-label { width: 100%; font-size: 13px; opacity: 0.6; margin-bottom: 6px; }
    .login-input {
      width: 100%; padding: 14px 16px; border-radius: 12px; font-size: 17px;
      border: 1.5px solid #e0e0e0; background: #f5f5f5; color: #000;
      margin-bottom: 12px; box-sizing: border-box; text-align: center;
      letter-spacing: 4px;
    }
    .login-input:focus { outline: none; border-color: #2481cc; }
    .login-input.name-input { letter-spacing: 0; text-align: left; }
    .login-btn {
      width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700;
      background: #2481cc; color: #fff; border: none; cursor: pointer; margin-top: 4px;
    }
    .login-btn:active { opacity: 0.8; }
    .login-error { color: #e53e3e; font-size: 14px; margin-top: 10px; min-height: 20px; text-align: center; }
    .name-section { width: 100%; display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-icon">💪</div>
    <div class="login-title">Gym Tracker</div>
    <div class="login-sub">Введи PIN для входа</div>

    <div id="name-section" class="name-section">
      <div class="login-label">Твоё имя (первый вход)</div>
      <input class="login-input name-input" type="text" id="name-input" placeholder="Например: Александр" maxlength="30">
    </div>

    <div class="login-label">PIN-код</div>
    <input class="login-input" type="password" inputmode="numeric" id="pin-input" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">Войти</button>
    <div class="login-error" id="error-msg"></div>
  </div>

  <script>
    // Already logged in?
    if (localStorage.getItem('gymToken')) location.href = '/';

    let isFirstTime = false;

    // Check if first time setup needed
    fetch('/api/health').then(() =>
      fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin: '__check__' }) })
    ).then(r => r.json()).then(data => {
      // If error is 'Неверный PIN' → user exists, just need PIN
      // We show name field only when we can't find a user (first time)
    });

    async function login() {
      const pin = document.getElementById('pin-input').value.trim();
      const name = document.getElementById('name-input').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!pin) { errorEl.textContent = 'Введи PIN'; return; }

      const btn = document.querySelector('.login-btn');
      btn.textContent = '...'; btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin, name }),
        });
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 401) {
            errorEl.textContent = 'Неверный PIN';
          } else {
            errorEl.textContent = data.error || 'Ошибка';
          }
          btn.textContent = 'Войти'; btn.disabled = false;
          return;
        }
        localStorage.setItem('gymToken', data.token);
        localStorage.setItem('gymName', data.name || 'Пользователь');
        location.href = '/';
      } catch (e) {
        errorEl.textContent = 'Ошибка соединения';
        btn.textContent = 'Войти'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
