<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Gym Tracker">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 380px; padding: 0 24px; }

    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo-icon { font-size: 64px; display: block; margin-bottom: 8px; }
    .login-logo-title { font-size: 24px; font-weight: 700; }

    .tabs { display: flex; background: #f0f0f0; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; font-size: 15px; font-weight: 600;
      border: none; background: none; border-radius: 9px; cursor: pointer;
      color: #888; transition: all 0.15s;
    }
    .tab.active { background: #fff; color: #000; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .field-label { font-size: 13px; opacity: 0.6; margin-bottom: 5px; display: block; }
    .field-wrap { margin-bottom: 12px; }
    .field-input {
      width: 100%; padding: 14px 16px; border-radius: 12px; font-size: 16px;
      border: 1.5px solid #e0e0e0; background: #f5f5f5; color: #000;
      box-sizing: border-box;
    }
    .field-input:focus { outline: none; border-color: #2481cc; background: #fff; }

    .btn-submit {
      width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700;
      background: #2481cc; color: #fff; border: none; cursor: pointer; margin-top: 4px;
    }
    .btn-submit:active { opacity: 0.85; }
    .error-msg { color: #e53e3e; font-size: 14px; margin-top: 10px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="login-logo-icon">💪</span>
      <span class="login-logo-title">Gym Tracker</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Войти</button>
      <button class="tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Login -->
    <div class="form-section active" id="section-login">
      <div class="field-wrap">
        <label class="field-label">Логин</label>
        <input class="field-input" type="text" id="l-username" placeholder="your_login" autocomplete="username" autocapitalize="none">
      </div>
      <div class="field-wrap">
        <label class="field-label">Пароль</label>
        <input class="field-input" type="password" id="l-password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') submit('login')">
      </div>
      <button class="btn-submit" onclick="submit('login')">Войти</button>
      <div class="error-msg" id="error-login"></div>
    </div>

    <!-- Register -->
    <div class="form-section" id="section-register">
      <div class="field-wrap">
        <label class="field-label">Имя</label>
        <input class="field-input" type="text" id="r-name" placeholder="Александр" autocomplete="name">
      </div>
      <div class="field-wrap">
        <label class="field-label">Логин (только латиница, мин. 3 символа)</label>
        <input class="field-input" type="text" id="r-username" placeholder="alex123" autocomplete="username" autocapitalize="none">
      </div>
      <div class="field-wrap">
        <label class="field-label">Пароль (мин. 4 символа)</label>
        <input class="field-input" type="password" id="r-password" placeholder="••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter') submit('register')">
      </div>
      <button class="btn-submit" onclick="submit('register')">Создать аккаунт</button>
      <div class="error-msg" id="error-register"></div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('gymToken')) location.href = '/';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('section-login').classList.toggle('active', tab === 'login');
      document.getElementById('section-register').classList.toggle('active', tab === 'register');
    }

    async function submit(mode) {
      const errEl = document.getElementById(`error-${mode}`);
      errEl.textContent = '';

      let body, url;
      if (mode === 'login') {
        body = {
          username: document.getElementById('l-username').value.trim(),
          password: document.getElementById('l-password').value,
        };
        url = '/api/auth/login';
      } else {
        body = {
          name: document.getElementById('r-name').value.trim(),
          username: document.getElementById('r-username').value.trim(),
          password: document.getElementById('r-password').value,
        };
        url = '/api/auth/register';
      }

      const btn = document.querySelector(`#section-${mode} .btn-submit`);
      btn.textContent = '...'; btn.disabled = true;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Ошибка';
          btn.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
          btn.disabled = false;
          return;
        }
        localStorage.setItem('gymToken', data.token);
        localStorage.setItem('gymName', data.name);
        localStorage.setItem('gymUsername', data.username);
        if (data.avatar_data) localStorage.setItem('gymAvatar', data.avatar_data);
        else localStorage.removeItem('gymAvatar');
        location.href = '/';
      } catch {
        errEl.textContent = 'Ошибка соединения';
        btn.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
