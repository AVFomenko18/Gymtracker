<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gym Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #user-card { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .user-avatar-placeholder {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="header">💪 Gym Tracker</div>

  <div class="page">
    <div class="card" id="user-card">
      <div id="user-avatar-wrap"></div>
      <div>
        <div style="font-size:15px; font-weight:600" id="user-name">Загрузка...</div>
        <div style="font-size:13px; opacity:0.5; margin-top:4px" id="user-greeting"></div>
      </div>
    </div>

    <div class="nav-grid">
      <button class="nav-card" id="workout-btn" onclick="goToTodayWorkout()">
        <span class="nav-emoji">🏋️</span>
        <span class="nav-label">Тренировка</span>
      </button>
      <button class="nav-card" onclick="location.href='/history.html'">
        <span class="nav-emoji">📋</span>
        <span class="nav-label">История</span>
      </button>
      <button class="nav-card" onclick="location.href='/measurements.html'">
        <span class="nav-emoji">📏</span>
        <span class="nav-label">Замеры</span>
      </button>
      <button class="nav-card" onclick="location.href='/nutrition.html'">
        <span class="nav-emoji">🥗</span>
        <span class="nav-label">Питание</span>
      </button>
      <button class="nav-card" onclick="location.href='/exercises.html'" style="grid-column:span 2">
        <span class="nav-emoji">📚</span>
        <span class="nav-label">Мои упражнения</span>
      </button>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function localToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    async function goToTodayWorkout() {
      const btn = document.getElementById('workout-btn');
      btn.style.opacity = '0.5';
      try {
        const workouts = await api.get('/api/workouts');
        const today = localToday();
        const todayWorkout = workouts.find(w => String(w.date).slice(0, 10) === today);
        if (todayWorkout) {
          location.href = `/workout.html?id=${todayWorkout.id}`;
        } else {
          location.href = '/workout.html';
        }
      } catch {
        location.href = '/workout.html';
      }
    }

    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('user-name').textContent =
        user.first_name + (user.last_name ? ' ' + user.last_name : '');

      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
      document.getElementById('user-greeting').textContent = greeting + '! Готов к тренировке?';

      const avatarWrap = document.getElementById('user-avatar-wrap');
      if (user.photo_url) {
        avatarWrap.innerHTML = `<img class="user-avatar" src="${user.photo_url}" alt="">`;
      } else {
        const initial = (user.first_name || '?')[0].toUpperCase();
        avatarWrap.innerHTML = `<div class="user-avatar-placeholder">${initial}</div>`;
      }
    }
  </script>
</body>
</html>
