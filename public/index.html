<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gym Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 24px;
    }

    .user-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 16px 24px;
      display: inline-block;
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
    }

    .user-id {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">💪</div>
    <h1>Gym Tracker</h1>
    <p>Приложение запущено!</p>
    <div class="user-card">
      <div class="user-name" id="user-name">Загрузка...</div>
      <div class="user-id" id="user-id"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('user-name').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
      document.getElementById('user-id').textContent = 'ID: ' + user.id;
    } else {
      document.getElementById('user-name').textContent = 'Открой в Telegram';
      document.getElementById('user-id').textContent = 'В браузере данные не доступны';
    }
  </script>
</body>
</html>
