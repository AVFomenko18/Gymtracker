<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gym Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #user-card { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .user-avatar-placeholder {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
    }

    .calendar {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 14px; padding: 14px; margin-bottom: 10px;
    }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-title { font-size: 15px; font-weight: 700; text-transform: capitalize; }
    .cal-nav {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: var(--tg-theme-button-color, #2481cc); padding: 0 8px; line-height: 1;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-dow {
      text-align: center; font-size: 11px; opacity: 0.5;
      padding: 4px 0; font-weight: 600;
    }
    .cal-day {
      text-align: center; padding: 6px 2px; font-size: 13px;
      border-radius: 8px; cursor: default; line-height: 1.4;
    }
    .cal-day.today { font-weight: 700; color: var(--tg-theme-button-color, #2481cc); }
    .cal-day.has-workout {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      cursor: pointer; font-weight: 600;
    }
    .cal-day.has-workout:active { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="header">💪 Gym Tracker</div>

  <div class="page">
    <div class="card" id="user-card">
      <div id="user-avatar-wrap"></div>
      <div>
        <div style="font-size:15px; font-weight:600" id="user-name">Загрузка...</div>
        <div style="font-size:13px; opacity:0.5; margin-top:4px" id="user-greeting"></div>
      </div>
    </div>

    <div class="nav-grid">
      <button class="nav-card" id="workout-btn" onclick="goToTodayWorkout()">
        <span class="nav-emoji">🏋️</span>
        <span class="nav-label">Тренировка</span>
      </button>
      <button class="nav-card" onclick="location.href='/history.html'">
        <span class="nav-emoji">📋</span>
        <span class="nav-label">История</span>
      </button>
      <button class="nav-card" onclick="location.href='/measurements.html'">
        <span class="nav-emoji">📏</span>
        <span class="nav-label">Замеры</span>
      </button>
      <button class="nav-card" onclick="location.href='/nutrition.html'">
        <span class="nav-emoji">🥗</span>
        <span class="nav-label">Питание</span>
      </button>
      <button class="nav-card" onclick="location.href='/exercises.html'" style="grid-column:span 2">
        <span class="nav-emoji">📚</span>
        <span class="nav-label">Мои упражнения</span>
      </button>
    </div>

    <div id="calendar"></div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/cache.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                    'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

    let workouts = [];
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    function localToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function buildWorkoutDayMap() {
      const map = {};
      for (const w of workouts) {
        map[String(w.date).slice(0, 10)] = w.id;
      }
      return map;
    }

    function renderCalendar() {
      const dayMap = buildWorkoutDayMap();
      const todayKey = localToday();
      const firstDay = new Date(calYear, calMonth, 1);
      let startDow = (firstDay.getDay() + 6) % 7;
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

      let html = `<div class="calendar">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <span class="cal-title">${MONTHS[calMonth]} ${calYear}</span>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid">`;

      for (const d of DAYS) html += `<div class="cal-dow">${d}</div>`;
      for (let i = 0; i < startDow; i++) html += `<div class="cal-day empty"></div>`;

      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = key === todayKey;
        const wid = dayMap[key];
        let cls = 'cal-day' + (wid ? ' has-workout' : '') + (isToday ? ' today' : '');
        const onclick = wid ? `onclick="location.href='/workout.html?id=${wid}'"` : '';
        html += `<div class="${cls}" ${onclick}>${d}</div>`;
      }

      html += `</div></div>`;
      document.getElementById('calendar').innerHTML = html;
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    }

    async function loadWorkouts() {
      const cached = dataCache.get('workouts');
      if (cached) { workouts = cached; renderCalendar(); }
      const fresh = await api.get('/api/workouts');
      workouts = fresh;
      dataCache.set('workouts', fresh);
      renderCalendar();
    }

    async function goToTodayWorkout() {
      const btn = document.getElementById('workout-btn');
      btn.style.opacity = '0.5';
      try {
        const today = localToday();
        const list = workouts.length ? workouts : await api.get('/api/workouts');
        const todayWorkout = list.find(w => String(w.date).slice(0, 10) === today);
        location.href = todayWorkout ? `/workout.html?id=${todayWorkout.id}` : '/workout.html';
      } catch {
        location.href = '/workout.html';
      }
    }

    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('user-name').textContent =
        user.first_name + (user.last_name ? ' ' + user.last_name : '');

      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
      document.getElementById('user-greeting').textContent = greeting + '! Готов к тренировке?';

      const avatarWrap = document.getElementById('user-avatar-wrap');
      if (user.photo_url) {
        avatarWrap.innerHTML = `<img class="user-avatar" src="${user.photo_url}" alt="">`;
      } else {
        const initial = (user.first_name || '?')[0].toUpperCase();
        avatarWrap.innerHTML = `<div class="user-avatar-placeholder">${initial}</div>`;
      }
    }

    loadWorkouts();
  </script>
</body>
</html>
