<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Замеры</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <button onclick="history.back()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0">←</button>
    📏 Замеры тела
  </div>
  <div class="page">
    <div class="empty">Скоро здесь будут замеры тела 📏</div>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => history.back());
  </script>
</body>
</html>
