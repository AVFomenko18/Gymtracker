<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Тренировка</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Selection mode */
    .select-btn {
      background: none; border: none;
      font-size: 15px; font-weight: 600;
      color: var(--tg-theme-button-color, #2481cc);
      cursor: pointer; padding: 10px 4px; margin-left: 6px; flex-shrink: 0;
      min-height: 44px;
    }

    .exercise-block { position: relative; transition: outline 0.15s; }
    .exercise-block.selectable { cursor: pointer; }
    .exercise-block.selected {
      outline: 2px solid var(--tg-theme-button-color, #2481cc);
      outline-offset: 1px;
    }
    .select-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--tg-theme-button-color, #2481cc);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px;
    }
    .select-check.checked {
      background: var(--tg-theme-button-color, #2481cc);
      color: #fff;
    }

    /* Superset group wrapper */
    .superset-group {
      border-left: 3px solid var(--tg-theme-button-color, #2481cc);
      margin-bottom: 10px;
    }
    .superset-group .card {
      margin-bottom: 0;
      border-radius: 0;
    }
    .superset-group .exercise-block:first-child {
      border-radius: 0 12px 0 0;
    }
    .superset-group .exercise-block:last-child {
      border-radius: 0 0 12px 0;
    }
    .superset-connector {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px;
      background: rgba(36, 129, 204, 0.07);
    }
    .superset-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--tg-theme-button-color, #2481cc);
      opacity: 0.9; text-transform: uppercase;
    }
    .superset-remove {
      background: none; border: none; font-size: 18px;
      color: var(--tg-theme-hint-color, #999); cursor: pointer;
      padding: 8px 12px; min-height: 44px;
      display: flex; align-items: center;
    }

    /* Sticky superset action bar */
    .superset-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--tg-theme-bg-color, #fff);
      border-top: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      padding: 12px 16px 24px;
      display: flex; gap: 10px; z-index: 50;
    }
    .superset-bar .btn-cancel-sel {
      flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600;
      border: 1.5px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      background: transparent; color: var(--tg-theme-text-color, #000); cursor: pointer;
    }
    .superset-bar .btn-superset {
      flex: 2; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff); border: none; cursor: pointer;
    }
    .superset-bar .btn-superset:disabled {
      opacity: 0.4; cursor: default;
    }

    .page-with-bar { padding-bottom: 100px; }

    /* Collapse chevron */
    .collapse-btn {
      background: none; border: none; cursor: pointer;
      padding: 8px 6px; font-size: 20px; opacity: 0.45;
      color: var(--tg-theme-text-color, #000);
      line-height: 1; flex-shrink: 0;
      min-height: 44px; display: flex; align-items: center;
    }
    .chevron { display: inline-block; transition: transform 0.2s; }
    .chevron.closed { transform: rotate(-90deg); }

    .stats-btn {
      background: none; border: none; font-size: 17px; cursor: pointer;
      padding: 8px 6px; opacity: 0.5; flex-shrink: 0;
      min-height: 44px; display: flex; align-items: center;
    }
    .superset-bar .btn-delete-ex {
      flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600;
      background: #e53e3e; color: #fff; border: none; cursor: pointer;
    }
    .superset-bar .btn-delete-ex:disabled { opacity: 0.4; cursor: default; }

    /* Program modals */
    .prog-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end; z-index: 100;
    }
    .prog-sheet {
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 16px 16px 0 0;
      padding: 20px 16px 32px;
      width: 100%; max-height: 72vh; overflow-y: auto; box-sizing: border-box;
    }
    .prog-sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
    .prog-input {
      width: 100%; padding: 12px 16px; border-radius: 12px; margin-bottom: 10px;
      border: 1.5px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      font-size: 15px; box-sizing: border-box;
    }
    .prog-input:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }
    .prog-ex-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
      font-size: 14px;
    }
    .prog-ex-item:last-child { border-bottom: none; }
    .prog-pick-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
      cursor: pointer;
    }
    .prog-pick-item:last-child { border-bottom: none; }
    .prog-pick-item:active { opacity: 0.7; }
    .prog-modal-btns { display: flex; gap: 8px; margin-top: 14px; }
    .prog-btn-cancel {
      flex: 1; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600;
      border: 1.5px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      background: transparent; color: var(--tg-theme-text-color, #000); cursor: pointer;
    }
    .prog-btn-save {
      flex: 2; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff); border: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <button onclick="goBack()" class="btn-back">←</button>
    🏋️ Тренировка
    <input type="date" id="workout-date-input"
      style="margin-left:auto;border:none;background:transparent;font-size:13px;color:var(--tg-theme-hint-color,#999);cursor:pointer;outline:none;text-align:right;max-width:110px"
      onchange="changeDate(this.value)">
    <button class="select-btn" id="select-toggle-btn" onclick="toggleSelectMode()">Выбрать</button>
  </div>

  <div class="page" id="page-wrap">
    <div id="main-content">
      <div class="spinner">Загрузка...</div>
    </div>
  </div>

  <!-- Save as program modal -->
  <div class="prog-overlay" id="save-prog-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="prog-sheet">
      <div class="prog-sheet-title">💾 Сохранить как программу</div>
      <input class="prog-input" type="text" id="prog-name-input" placeholder="Название, например «День ног»">
      <div style="font-size:13px;opacity:0.6;margin-bottom:6px" id="save-prog-ex-label"></div>
      <div id="save-prog-exercises"></div>
      <div class="prog-modal-btns">
        <button class="prog-btn-cancel" onclick="document.getElementById('save-prog-modal').style.display='none'">Отмена</button>
        <button class="prog-btn-save" onclick="saveAsProgram()">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Load program modal -->
  <div class="prog-overlay" id="load-prog-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="prog-sheet">
      <div class="prog-sheet-title">📋 Выбрать программу</div>
      <div id="load-prog-list"><div style="text-align:center;padding:20px;opacity:0.5;font-size:14px">Загрузка...</div></div>
      <button class="prog-btn-cancel" style="width:100%;margin-top:14px;box-sizing:border-box" onclick="document.getElementById('load-prog-modal').style.display='none'">Отмена</button>
    </div>
  </div>

  <!-- Superset action bar (shown in select mode) -->
  <div class="superset-bar" id="superset-bar" style="display:none">
    <button class="btn-cancel-sel" onclick="toggleSelectMode()">Отмена</button>
    <button class="btn-delete-ex" id="delete-ex-btn" onclick="deleteSelectedExercises()" disabled>🗑 Удалить</button>
    <button class="btn-superset" id="superset-btn" onclick="createSuperset()" disabled>⚡ Суперсет</button>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cache.js"></script>
  <script>
    if (!localStorage.getItem('gymToken')) { location.href = '/login.html'; }

    function goBack() {
      if (selectMode) { toggleSelectMode(); return; }
      // Invalidate workouts cache so home screen reflects the current state
      dataCache.clear('workouts');
      location.href = '/';
    }

    let workoutId = null;
    let exercises = [];
    let sets = [];
    let supersets = []; // [{id, workout_id, exercise_id_1, exercise_id_2}]
    let selectMode = false;
    let selectedExercises = new Set(); // Set of exercise_id strings
    let collapsedExercises = new Set(); // Set of exercise_id strings

    function toggleSetsCollapse(exerciseId) {
      const key = String(exerciseId);
      if (collapsedExercises.has(key)) collapsedExercises.delete(key);
      else collapsedExercises.add(key);
      render();
    }

    const params = new URLSearchParams(location.search);
    const existingId = params.get('id');
    const addExerciseId = params.get('addExercise');

    async function init() {
      if (existingId) {
        // Fetch exercises + workout data in parallel — cuts load time in half
        const [exList, w] = await Promise.all([
          api.get('/api/exercises'),
          api.get(`/api/workouts/${existingId}`),
        ]);
        exercises = exList;
        workoutId = existingId;
        sets = w.sets || [];
        supersets = w.supersets || [];
        setDateInput(w.date);
      } else {
        const today = localToday();
        const [exList, w] = await Promise.all([
          api.get('/api/exercises'),
          api.post('/api/workouts', { date: today }),
        ]);
        exercises = exList;
        workoutId = w.id;
        supersets = [];
        setDateInput(w.date);
      }

      // Restore placeholders saved before navigating to exercise picker
      const pendingRaw = sessionStorage.getItem('pendingExercises');
      if (pendingRaw) {
        sessionStorage.removeItem('pendingExercises');
        const pendingIds = JSON.parse(pendingRaw);
        for (const pid of pendingIds) {
          if (!sets.some(s => String(s.exercise_id) === pid)) addExerciseById(pid);
        }
      }

      render();

      if (addExerciseId) {
        addExerciseById(addExerciseId);
        history.replaceState({}, '', `/workout.html?id=${workoutId}`);
      }
    }

    function localToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function setDateInput(dateStr) {
      document.getElementById('workout-date-input').value = String(dateStr).slice(0,10);
    }

    async function changeDate(newDate) {
      if (!workoutId || !newDate) return;
      await api.put(`/api/workouts/${workoutId}`, { date: newDate });
    }

    function toggleSelectMode() {
      selectMode = !selectMode;
      selectedExercises.clear();
      document.getElementById('select-toggle-btn').textContent = selectMode ? 'Готово' : 'Выбрать';
      document.getElementById('superset-bar').style.display = selectMode ? 'flex' : 'none';
      document.getElementById('page-wrap').classList.toggle('page-with-bar', selectMode);
      render();
    }

    function toggleExerciseSelect(exerciseId) {
      if (!selectMode) return;
      const key = String(exerciseId);
      if (selectedExercises.has(key)) {
        selectedExercises.delete(key);
      } else {
        if (selectedExercises.size >= 2) return; // max 2
        selectedExercises.add(key);
      }
      document.getElementById('superset-btn').disabled = selectedExercises.size !== 2;
      document.getElementById('delete-ex-btn').disabled = selectedExercises.size === 0;
      render();
    }

    // Build superset lookup: exerciseId -> supersetId (for current workout)
    function buildSupersetMap() {
      const map = {}; // exerciseId -> {supersetId, partnerId}
      for (const ss of supersets) {
        const id1 = String(ss.exercise_id_1);
        const id2 = String(ss.exercise_id_2);
        map[id1] = { supersetId: String(ss.id), partnerId: id2 };
        map[id2] = { supersetId: String(ss.id), partnerId: id1 };
      }
      return map;
    }

    function groupByExercise() {
      const map = new Map();
      for (const s of sets) {
        const key = String(s.exercise_id);
        if (!map.has(key)) {
          map.set(key, { exercise_id: key, exercise_name: s.exercise_name, muscle_group: s.muscle_group, sets: [] });
        }
        map.get(key).sets.push(s);
      }
      return Array.from(map.values());
    }

    const MUSCLE_ICONS = {
      'Ноги':    '🦵',
      'Грудь':   '🫁',
      'Спина':   '🏋️',
      'Плечи':   '🤸',
      'Бицепс':  '💪',
      'Трицепс': '💪',
      'Пресс':   '🔥',
      'Кардио':  '🫀',
    };
    function muscleIcon(mg) { return MUSCLE_ICONS[mg] || '🎯'; }

    function calcTonnage(arr) {
      return arr.filter(s => !s._placeholder).reduce((sum, s) => sum + parseFloat(s.weight) * parseInt(s.reps), 0);
    }

    function render() {
      const groups = groupByExercise();
      const realSetsAll = sets.filter(s => !s._placeholder);
      const totalTonnage = calcTonnage(realSetsAll);
      const ssMap = buildSupersetMap();

      // Order groups: pair superset partners together
      const ordered = orderGroupsWithSupersets(groups, ssMap);

      let html = '';

      if (realSetsAll.length > 0) {
        html += `<div class="card">
          <div class="summary"><span>Тоннаж тренировки</span><strong>${totalTonnage.toFixed(1)} кг</strong></div>
          <div class="summary"><span>Подходов</span><strong>${realSetsAll.length}</strong></div>
        </div>`;
      }

      for (let i = 0; i < ordered.length; i++) {
        const g = ordered[i];
        const exId = String(g.exercise_id);
        const exTonnage = calcTonnage(g.sets);
        const isSelected = selectedExercises.has(exId);
        const ssInfo = ssMap[exId];
        const inSuperset = !!ssInfo;

        const isFirstOfPair = inSuperset && i + 1 < ordered.length && String(ordered[i+1].exercise_id) === ssInfo.partnerId;
        const isSecondOfPair = inSuperset && i > 0 && String(ordered[i-1].exercise_id) === ssInfo.partnerId;
        const isCollapsed = collapsedExercises.has(exId);

        if (isFirstOfPair) html += `<div class="superset-group">`;

        if (isSecondOfPair) {
          html += `<div class="superset-connector">
            <span class="superset-label">⚡ Суперсет</span>
            <button class="superset-remove" onclick="removeSuperset('${ssInfo.supersetId}')">✕</button>
          </div>`;
        }

        const selectAttrs = selectMode
          ? `onclick="toggleExerciseSelect('${exId}')" style="cursor:pointer"`
          : '';

        html += `<div class="card exercise-block${isSelected?' selected':''}${selectMode?' selectable':''}" ${selectAttrs}>
          <div class="exercise-title">
            ${selectMode ? `<div class="select-check${isSelected?' checked':''}">
              ${isSelected ? '✓' : ''}
            </div>` : ''}
            <span style="font-size:18px;flex-shrink:0;margin-right:6px${selectMode?';margin-left:8px':''}">${muscleIcon(g.muscle_group)}</span>
            <span class="exercise-name">${g.exercise_name}</span>
            ${!selectMode ? `<button class="stats-btn" onclick="event.stopPropagation();location.href='/exercise-stats.html?id=${exId}&name=${encodeURIComponent(g.exercise_name)}'">📊</button>` : ''}
            ${!selectMode ? `<button class="collapse-btn" onclick="event.stopPropagation();toggleSetsCollapse('${exId}')"><span class="chevron${isCollapsed?' closed':''}">▾</span></button>` : ''}
          </div>
          ${!isCollapsed && exTonnage > 0 ? `<div style="font-size:12px;opacity:0.5;margin-bottom:6px;padding:0 4px">${exTonnage.toFixed(1)} кг</div>` : ''}`;

        if (!isCollapsed) {
          const realSets = g.sets.filter(s => !s._placeholder);
          for (let j = 0; j < realSets.length; j++) {
            const s = realSets[j];
            const t = (parseFloat(s.weight) * parseInt(s.reps)).toFixed(1);
            html += `<div class="set-row">
              <span class="set-num">${j+1}</span>
              <div class="set-info">
                ${s.weight} кг × ${s.reps} повт
                <div class="set-tonnage">${t} кг тоннаж</div>
              </div>
              ${!selectMode ? `<button class="btn-danger" onclick="deleteSet('${s.id}','${exId}')">×</button>` : ''}
            </div>`;
          }

          if (!selectMode) {
            html += `<div class="input-row" id="input-${exId}">
              <input class="input-field" type="number" placeholder="Вес" id="w-${exId}" min="0" step="0.5" style="min-width:0">
              <input class="input-field" type="number" placeholder="Повт" id="r-${exId}" min="1" step="1" style="min-width:0">
              <button class="btn-add" onclick="addSet('${exId}')">+</button>
            </div>`;
          }
        }

        html += `</div>`;

        if (isSecondOfPair) html += `</div>`; // close superset-group
      }

      if (!selectMode) {
        const copyBtn = existingId ? `<button class="btn-outline" onclick="copyWorkoutToToday()" style="width:100%;justify-content:center;margin-top:8px">
            📋 Скопировать на сегодня
          </button>` : '';
        const noExercises = ordered.length === 0;
        const loadBtn = noExercises ? `<button class="btn-outline" onclick="openLoadProgram()" style="width:100%;justify-content:center;margin-top:8px">
            📋 Начать по программе
          </button>` : '';
        const saveBtn = !noExercises ? `<button class="btn-outline" onclick="openSaveProgram()" style="width:100%;justify-content:center;margin-top:8px">
            💾 Сохранить как программу
          </button>` : '';
        html += `<div class="card">
          <button class="btn-primary" onclick="goToExercisePicker()" style="margin-bottom:0">
            + Выбрать упражнение
          </button>
          ${loadBtn}
          ${saveBtn}
          ${copyBtn}
        </div>`;
      }

      if (sets.length === 0) {
        html = `<div class="empty">Нет подходов.<br>Выбери упражнение ниже.</div>` + html;
      }

      document.getElementById('main-content').innerHTML = html;
    }

    // Reorder groups so superset partners are adjacent
    function orderGroupsWithSupersets(groups, ssMap) {
      const result = [];
      const placed = new Set();
      for (const g of groups) {
        const key = String(g.exercise_id);
        if (placed.has(key)) continue;
        result.push(g);
        placed.add(key);
        const ssInfo = ssMap[key];
        if (ssInfo) {
          const partner = groups.find(x => String(x.exercise_id) === ssInfo.partnerId);
          if (partner && !placed.has(ssInfo.partnerId)) {
            result.push(partner);
            placed.add(ssInfo.partnerId);
          }
        }
      }
      return result;
    }

    async function deleteSelectedExercises() {
      if (!selectedExercises.size) return;
      if (!confirm('Удалить выбранные упражнения?')) return;
      for (const exId of selectedExercises) {
        const toDelete = sets.filter(s => String(s.exercise_id) === exId && !s._placeholder);
        for (const s of toDelete) await api.delete(`/api/workouts/sets/${s.id}`);
        sets = sets.filter(s => String(s.exercise_id) !== exId);
      }
      toggleSelectMode();
    }

    async function createSuperset() {
      if (selectedExercises.size !== 2) return;
      const [id1, id2] = [...selectedExercises];
      await api.post(`/api/workouts/${workoutId}/supersets`, {
        exercise_id_1: id1,
        exercise_id_2: id2,
      });
      // Refresh superset data
      const w = await api.get(`/api/workouts/${workoutId}`);
      supersets = w.supersets || [];
      toggleSelectMode();
    }

    async function removeSuperset(supersetId) {
      await api.delete(`/api/workouts/${workoutId}/supersets/${supersetId}`);
      supersets = supersets.filter(ss => String(ss.id) !== String(supersetId));
      render();
    }

    async function copyWorkoutToToday() {
      const today = localToday();
      const currentDate = document.getElementById('workout-date-input').value;
      if (currentDate === today) {
        alert('Эта тренировка уже на сегодня');
        return;
      }
      const realSets = sets.filter(s => !s._placeholder);
      if (!realSets.length) {
        alert('Нет подходов для копирования');
        return;
      }
      const newWorkout = await api.post('/api/workouts', { date: today });
      for (const s of realSets) {
        await api.post(`/api/workouts/${newWorkout.id}/sets`, {
          exercise_id: s.exercise_id,
          weight: s.weight,
          reps: s.reps,
        });
      }
      location.href = `/workout.html?id=${newWorkout.id}`;
    }

    function goToExercisePicker() {
      const placeholders = sets.filter(s => s._placeholder).map(s => String(s.exercise_id));
      if (placeholders.length) sessionStorage.setItem('pendingExercises', JSON.stringify(placeholders));
      location.href = `/exercises.html?mode=select&workoutId=${workoutId}`;
    }

    function addExerciseById(exerciseId) {
      const ex = exercises.find(e => String(e.id) === String(exerciseId));
      if (!ex) return;
      if (sets.some(s => String(s.exercise_id) === String(exerciseId))) {
        setTimeout(() => document.getElementById(`w-${exerciseId}`)?.focus(), 100);
        return;
      }
      sets.push({
        id: 'placeholder-' + exerciseId, exercise_id: String(exerciseId),
        exercise_name: ex.name, muscle_group: ex.muscle_group,
        weight: 0, reps: 0, _placeholder: true,
      });
      render();
      setTimeout(() => document.getElementById(`w-${exerciseId}`)?.focus(), 100);
    }

    async function addSet(exerciseId) {
      const wInput = document.getElementById(`w-${exerciseId}`);
      const rInput = document.getElementById(`r-${exerciseId}`);
      const weight = parseFloat(wInput.value);
      const reps = parseInt(rInput.value);
      if (!weight || !reps || weight <= 0 || reps <= 0) { wInput.focus(); return; }


      const newSet = await api.post(`/api/workouts/${workoutId}/sets`, { exercise_id: exerciseId, weight, reps });
      const ex = exercises.find(e => String(e.id) === String(exerciseId));
      newSet.exercise_name = ex?.name || '';
      newSet.muscle_group = ex?.muscle_group || '';

      // Replace placeholder in-place so the exercise stays in the same position
      const phIdx = sets.findIndex(s => s._placeholder && String(s.exercise_id) === String(exerciseId));
      if (phIdx !== -1) sets.splice(phIdx, 1, newSet);
      else sets.push(newSet);
      wInput.value = ''; rInput.value = '';
      render();
    }

    async function deleteSet(setId, exerciseId) {
      await api.delete(`/api/workouts/sets/${setId}`);
      sets = sets.filter(s => String(s.id) !== String(setId));
      render();
    }

    // ── Programs ──────────────────────────────────────────────────────────────

    let progExercisesToSave = [];

    function openSaveProgram() {
      const groups = groupByExercise();
      progExercisesToSave = groups.map(g => ({ id: g.exercise_id, name: g.exercise_name, muscle_group: g.muscle_group }));
      if (!progExercisesToSave.length) return;
      document.getElementById('prog-name-input').value = '';
      document.getElementById('save-prog-ex-label').textContent = `Упражнения (${progExercisesToSave.length}):`;
      document.getElementById('save-prog-exercises').innerHTML = progExercisesToSave.map(e =>
        `<div class="prog-ex-item"><span>${muscleIcon(e.muscle_group)}</span><span>${e.name}</span></div>`
      ).join('');
      document.getElementById('save-prog-modal').style.display = 'flex';
      setTimeout(() => document.getElementById('prog-name-input').focus(), 100);
    }

    async function saveAsProgram() {
      const name = document.getElementById('prog-name-input').value.trim();
      if (!name) { document.getElementById('prog-name-input').focus(); return; }
      try {
        await api.post('/api/programs', { name, exercise_ids: progExercisesToSave.map(e => e.id) });
        document.getElementById('save-prog-modal').style.display = 'none';
        dataCache.clear('programs');
        showToast('✅ Программа «' + name + '» сохранена');
      } catch(err) {
        alert('Ошибка: ' + err.message);
      }
    }

    async function openLoadProgram() {
      document.getElementById('load-prog-modal').style.display = 'flex';
      try {
        const progs = await api.get('/api/programs');
        if (!progs.length) {
          document.getElementById('load-prog-list').innerHTML =
            '<div style="text-align:center;padding:20px;opacity:0.5;font-size:14px">Сохранённых программ нет.<br>После тренировки нажми «💾 Сохранить как программу».</div>';
          return;
        }
        document.getElementById('load-prog-list').innerHTML = progs.map(p => `
          <div class="prog-pick-item" onclick="loadProgramToWorkout('${p.id}')">
            <div style="flex:1">
              <div style="font-size:15px;font-weight:600">${p.name}</div>
              <div style="font-size:13px;opacity:0.5;margin-top:2px">${p.exercise_count} упражнений</div>
            </div>
            <span style="opacity:0.3;font-size:18px">›</span>
          </div>
        `).join('');
      } catch(err) {
        document.getElementById('load-prog-list').innerHTML =
          `<div style="color:#e53e3e;padding:16px;font-size:14px">Ошибка: ${err.message}</div>`;
      }
    }

    async function loadProgramToWorkout(programId) {
      document.getElementById('load-prog-modal').style.display = 'none';
      try {
        const prog = await api.get(`/api/programs/${programId}`);
        for (const ex of prog.exercises) {
          addExerciseById(String(ex.exercise_id));
        }
      } catch(err) {
        alert('Ошибка загрузки программы: ' + err.message);
      }
    }

    function showToast(msg) {
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;pointer-events:none;white-space:nowrap';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    // ─────────────────────────────────────────────────────────────────────────

    init().catch(err => {
      document.getElementById('main-content').innerHTML =
        `<div class="empty" style="color:#e53e3e">❌ Ошибка загрузки:<br><br>${err.message}<br><br><small>Закрой и открой снова</small></div>`;
    });
  </script>
</body>
</html>
